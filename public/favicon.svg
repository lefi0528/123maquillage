<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 128 128">
  <defs>
    <!-- Premium Golden Metallic Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF8F5" />
      <stop offset="30%" stop-color="#E8C56B" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#A6831F" />
    </linearGradient>
    <!-- Soft Rose Poudré Shading -->
    <linearGradient id="rose-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2C1B6" />
      <stop offset="50%" stop-color="#DE9E8E" />
      <stop offset="100%" stop-color="#C57E6E" />
    </linearGradient>
    <!-- Deep Shadow Rose for Lipstick Angle -->
    <linearGradient id="rose-shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BD7464" />
      <stop offset="100%" stop-color="#A45849" />
    </linearGradient>
  </defs>

  <style>
    .casing-base {
      fill: #1C1817;
      transition: fill 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      .casing-base {
        fill: #FAF8F5;
      }
    }
  </style>

  <!-- Sparkles / Star Elements (Cosmetics Theme) -->
  <path d="M 32 16 Q 32 26 22 26 Q 32 26 32 36 Q 32 26 42 26 Z" fill="url(#gold-grad)" />
  <path d="M 96 36 Q 96 42 90 42 Q 96 42 96 48 Q 96 42 102 42 Z" fill="url(#gold-grad)" />
  <circle cx="86" cy="22" r="3" fill="#DE9E8E" />

  <!-- Lipstick Base Casing -->
  <rect class="casing-base" x="48" y="74" width="32" height="38" rx="4" />
  
  <!-- Casing Accent Band -->
  <rect x="48" y="88" width="32" height="5" fill="url(#gold-grad)" />

  <!-- Lipstick Gold Collar -->
  <rect x="52" y="58" width="24" height="16" rx="2" fill="url(#gold-grad)" />

  <!-- Lipstick Paste (Slanted) -->
  <!-- Left shaded side -->
  <path d="M 54 58 L 54 36 L 64 30 L 64 58 Z" fill="url(#rose-shadow)" />
  <!-- Right highlighted side -->
  <path d="M 64 58 L 64 30 L 74 24 L 74 58 Z" fill="url(#rose-grad)" />

  <!-- Shiny highlight line on the paste -->
  <path d="M 58 54 L 58 39" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.7" />
</svg>
